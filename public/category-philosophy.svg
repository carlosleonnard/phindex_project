<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Open book with knowledge rays -->
  <circle cx="100" cy="100" r="90" fill="#e0f2f1" opacity="0.5"/>
  <!-- Book pages -->
  <path d="M100 60v90" stroke="#005753" stroke-width="3"/>
  <path d="M100 60c-5-8-25-15-50-12v85c25-3 45 4 50 12" fill="#009e97" opacity="0.8"/>
  <path d="M100 60c5-8 25-15 50-12v85c-25-3-45 4-50 12" fill="#007a75" opacity="0.8"/>
  <!-- Page lines left -->
  <line x1="60" y1="65" x2="92" y2="70" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="58" y1="80" x2="93" y2="84" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="56" y1="95" x2="94" y2="98" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="110" x2="95" y2="112" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <!-- Page lines right -->
  <line x1="108" y1="70" x2="140" y2="65" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="107" y1="84" x2="142" y2="80" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="106" y1="98" x2="144" y2="95" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="105" y1="112" x2="145" y2="110" stroke="#e0f2f1" stroke-width="1.5" opacity="0.6"/>
  <!-- Knowledge rays from top -->
  <line x1="100" y1="42" x2="100" y2="28" stroke="#007a75" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="82" y1="46" x2="74" y2="34" stroke="#007a75" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="46" x2="126" y2="34" stroke="#007a75" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="54" x2="58" y2="46" stroke="#007a75" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="132" y1="54" x2="142" y2="46" stroke="#007a75" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
